name: Lint and Format Check

on:
  pull_request:
    branches:
      - '*'

jobs:
  lint-and-format:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '23'

    - name: Install dependencies
      run: npm install

    - name: Run ESLint
      run: npx eslint . --fix --max-warnings=0

    - name: Run Prettier
      run: npx prettier --check .
