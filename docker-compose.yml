services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    volumes:
      - ./backend:/usr/src/cataso/backend
      - /usr/src/cataso/backend/node_modules # node_modules はローカルと分離
      - ./.env:/usr/src/cataso/.env
    working_dir: /usr/src/cataso/backend
    command: npm run dev
    expose:
      - 3000
    ports:
      - "3000:3000"
    # tty: true # 本番環境では不要
    # environment:
    #   - MYSQL_HOST=db
    #   - MYSQL_USER=root
    #   - MYSQL_PASSWORD=${MYSQL_PASSWORD}
    #   - MYSQL_DATABASE=cataso
    stop_grace_period: 60s
